{% extends 'base.html' %}
{% block content %}
<h2>Удалить бронирование?</h2>
<p>Вы уверены, что хотите удалить бронирование номера {{ object.room.room_type }} в отеле {{ object.room.hotel.name }}?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'bookings:user_bookings' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
